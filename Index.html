<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chess Openings</title>

  <!-- Chessboard.js CSS -->
  <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css" />

  <style>
    :root {
      --bg-wood: #1c130d;
      --card-bg: #2d1f16;
      --card-border: #4a3425;
      --accent-gold: #d4af37;
      --text: #f5e6d3;
      --light-square: #e3c193;
      --dark-square: #8b5a2b;
    }

    body {
      background-color: var(--bg-wood);
      background-image: radial-gradient(circle, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.85) 100%), 
                        linear-gradient(90deg, rgba(255,255,255,0.02) 50%, transparent 50%);
      background-size: 100% 100%, 4px 100%;
      color: var(--text);
      font-family: 'Georgia', serif;
      margin: 0;
      padding: 2rem 1rem;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 90vh;
    }

    .container {
      max-width: 500px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* Controls Bar */
    .controls-bar {
      display: flex;
      gap: 0.8rem;
      background: var(--card-bg);
      padding: 0.8rem;
      border-radius: 6px;
      border: 1px solid var(--card-border);
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.6), 0 4px 12px rgba(0,0,0,0.4);
    }

    select {
      flex: 1;
      background: #18100a;
      color: var(--text);
      border: 1px solid var(--card-border);
      padding: 0.6rem;
      border-radius: 4px;
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
      font-family: inherit;
    }

    /* Wooden Board Frame */
    #board {
      width: 100%;
      border-radius: 4px;
      padding: 12px;
      background: #3d281a;
      border: 4px solid #1a100a;
      box-shadow: 0 12px 28px rgba(0,0,0,0.7), inset 0 0 10px rgba(0,0,0,0.8);
      box-sizing: border-box;
    }

    /* Square Colors */
    .white-1e1d7 { background-color: var(--light-square) !important; }
    .black-3c85d { background-color: var(--dark-square) !important; }

    /* Step Controls */
    .step-buttons {
      display: flex;
      gap: 0.5rem;
    }

    .step-btn {
      flex: 1;
      background: var(--card-bg);
      color: var(--accent-gold);
      border: 1px solid var(--card-border);
      padding: 0.65rem;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-family: inherit;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    .step-btn:hover { background: #3c2a1e; }
  </style>
</head>
<body>

  <div class="container">
    <div class="controls-bar">
      <select id="opening-select" onchange="onOpeningChange()"></select>
      <select id="variation-select" onchange="onVariationChange()"></select>
    </div>

    <div id="board"></div>

    <div class="step-buttons">
      <button class="step-btn" onclick="stepMove(-1)">◀ Prev</button>
      <button class="step-btn" onclick="stepMove(1)">Next ▶</button>
    </div>
  </div>

  <!-- Dependencies -->
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

  <script>
    const openingTree = {
      "kings-gambit": {
        name: "King's Gambit",
        variations: [
          { name: "Accepted (KGA)", moves: ["e4", "e5", "f4", "exf4", "Nf3", "g5", "Bc4", "Bg7"] },
          { name: "Declined (KGD)", moves: ["e4", "e5", "f4", "Bc5", "Nf3", "d6", "Nc3", "Nf6"] },
          { name: "Falkbeer Counter-Gambit", moves: ["e4", "e5", "f4", "d5", "exd5", "e4", "d3", "Nf6"] },
          { name: "TRAP: Keres Gambit / Early Qh4+", moves: ["e4", "e5", "f4", "exf4", "g3", "fxg3", "h3", "g2", "Bxg2", "Qh4+"] }
        ]
      },
      "sicilian": {
        name: "Sicilian Defense",
        variations: [
          { name: "Najdorf", moves: ["e4", "c5", "Nf3", "d6", "d4", "cxd4", "Nxd4", "Nf6", "Nc3", "a6"] },
          { name: "Dragon", moves: ["e4", "c5", "Nf3", "d6", "d4", "cxd4", "Nxd4", "Nf6", "Nc3", "g6"] },
          { name: "TRAP: Siberian Trap", moves: ["e4", "c5", "d4", "cxd4", "c3", "dxc3", "Nxc3", "Nc6", "Nf3", "e6", "Bc4", "Qc7", "O-O", "Nf6", "Qe2", "Ng4", "h3", "Nd4"] }
        ]
      },
      "ruy-lopez": {
        name: "Ruy Lopez",
        variations: [
          { name: "Closed Defense", moves: ["e4", "e5", "Nf3", "Nc6", "Bb5", "a6", "Ba4", "Nf6", "O-O", "Be7"] },
          { name: "Berlin Defense", moves: ["e4", "e5", "Nf3", "Nc6", "Bb5", "Nf6"] },
          { name: "TRAP: Noah's Ark Trap", moves: ["e4", "e5", "Nf3", "Nc6", "Bb5", "a6", "Ba4", "d6", "d4", "b5", "Bb3", "Nxd4", "Nxd4", "exd4", "Qxd4", "c5", "Qd5", "Be6", "Qc6+", "Bd7", "Qd5", "c4"] }
        ]
      },
      "italian-game": {
        name: "Italian Game",
        variations: [
          { name: "Giuoco Piano", moves: ["e4", "e5", "Nf3", "Nc6", "Bc4", "Bc5", "c3", "Nf6", "d4"] },
          { name: "Evans Gambit", moves: ["e4", "e5", "Nf3", "Nc6", "Bc4", "Bc5", "b4", "Bxb4", "c3"] },
          { name: "TRAP: Blackburne Shilling", moves: ["e4", "e5", "Nf3", "Nc6", "Bc4", "Nd4", "Nxe5", "Qg5", "Nxf7", "Qxg2", "Rf1", "Qxe4+", "Be2", "Nf3#"] }
        ]
      },
      "french-defense": {
        name: "French Defense",
        variations: [
          { name: "Advance Variation", moves: ["e4", "e6", "d4", "d5", "e5", "c5", "c3", "Nc6", "Nf3"] },
          { name: "Winawer Variation", moves: ["e4", "e6", "d4", "d5", "Nc3", "Bb4"] },
          { name: "TRAP: Milner-Barry Gambit", moves: ["e4", "e6", "d4", "d5", "e5", "c5", "c3", "Nc6", "Nf3", "Qb6", "Bd3", "cxd4", "cxd4", "Bd7", "O-O", "Nxd4", "Nxd4", "Qxd4", "Nc3", "a6", "Qe2", "Ne7", "Kh1", "Nc6", "f4", "Nb4", "Rd1", "Bc5", "Bxf5"] }
        ]
      },
      "caro-kann": {
        name: "Caro-Kann Defense",
        variations: [
          { name: "Classical", moves: ["e4", "c6", "d4", "d5", "Nc3", "dxe4", "Nxe4", "Bf5", "Ng3", "Bg6"] },
          { name: "Fantasy", moves: ["e4", "c6", "d4", "d5", "f3"] },
          { name: "TRAP: Smothered Mate", moves: ["e4", "c6", "d4", "d5", "Nc3", "dxe4", "Nxe4", "Nd7", "Qe2", "Ngf6", "Nd6#"] }
        ]
      },
      "scandinavian": {
        name: "Scandinavian Defense",
        variations: [
          { name: "Mainline (2...Qxd5)", moves: ["e4", "d5", "exd5", "Qxd5", "Nc3", "Qa5", "d4", "Nf6"] },
          { name: "Modern (2...Nf6)", moves: ["e4", "d5", "exd5", "Nf6", "d4", "Nxd5", "c4", "Nb6"] },
          { name: "TRAP: Portuguese Gambit", moves: ["e4", "d5", "exd5", "Nf6", "d4", "Bg4", "f3", "Bf5", "Bb5+", "Nbd7", "c4", "e6", "dxe6", "Bxe6", "d5", "Bf5", "Nc3", "Bc5"] }
        ]
      },
      "queens-gambit": {
        name: "Queen's Gambit",
        variations: [
          { name: "Accepted (QGA)", moves: ["d4", "d5", "c4", "dxc4", "e4", "e5", "Nf3"] },
          { name: "Declined (QGD)", moves: ["d4", "d5", "c4", "e6", "Nc3", "Nf6", "Bg5"] },
          { name: "Slav Defense", moves: ["d4", "d5", "c4", "c6", "Nf3", "Nf6", "Nc3", "dxc4"] },
          { name: "TRAP: Elephant Trap", moves: ["d4", "d5", "c4", "e6", "Nc3", "Nf6", "Bg5", "Nbd7", "cxd5", "exd5", "Nxd5", "Nxd5", "Bxd8", "Bb4+"] }
        ]
      },
      "kings-indian": {
        name: "King's Indian Defense",
        variations: [
          { name: "Classical", moves: ["d4", "Nf6", "c4", "g6", "Nc3", "Bg7", "e4", "d6", "Nf3", "O-O", "Be2", "e5"] },
          { name: "Sämisch", moves: ["d4", "Nf6", "c4", "g6", "Nc3", "Bg7", "e4", "d6", "f3", "O-O", "Be3"] }
        ]
      },
      "nimzo-indian": {
        name: "Nimzo-Indian Defense",
        variations: [
          { name: "Rubinstein", moves: ["d4", "Nf6", "c4", "e6", "Nc3", "Bb4", "e3", "O-O", "Bd3", "d5"] },
          { name: "Classical (Capablanca)", moves: ["d4", "Nf6", "c4", "e6", "Nc3", "Bb4", "Qc2", "O-O", "a3", "Bxc3+"] }
        ]
      },
      "dutch-defense": {
        name: "Dutch Defense",
        variations: [
          { name: "Leningrad", moves: ["d4", "f5", "g3", "Nf6", "Bg2", "g6", "Nf3", "Bg7", "O-O", "O-O"] },
          { name: "TRAP: Hopton Attack", moves: ["d4", "f5", "Bg5", "h6", "Bh4", "g5", "Bg3", "f4", "e3", "h5", "Bd3", "Rh6", "Qxh5+", "Rxh5", "Bg6#"] }
        ]
      },
      "english-opening": {
        name: "English Opening",
        variations: [
          { name: "Symmetrical", moves: ["c4", "c5", "Nc3", "Nc6", "g3", "g6", "Bg2", "Bg7"] },
          { name: "Reversed Sicilian", moves: ["c4", "e5", "Nc3", "Nf6", "g3", "d5", "cxd5", "Nxd5"] }
        ]
      },
      "london-system": {
        name: "London System",
        variations: [
          { name: "Main Line", moves: ["d4", "d5", "Nf3", "Nf6", "Bf4", "e6", "e3", "Bd6", "Bg3"] },
          { name: "TRAP: Early ...Qb6", moves: ["d4", "Nf6", "Bf4", "c5", "e3", "Qb6", "Nc3", "Qxb2", "Nb5", "Nd5", "Rb1", "Qxa2", "Ra1", "Qb2", "Bc4"] }
        ]
      }
    };

    let game = new Chess();
    let board = Chessboard('board', {
      position: 'start',
      // Uses Wikimedia wooden piece SVG theme
      pieceTheme: 'https://commons.wikimedia.org/wiki/Special:Redirect/file/Chess_{piece}t45.svg'
    });

    let currentMoves = [];
    let currentStepIndex = 0;

    const openSelect = document.getElementById('opening-select');
    for (let key in openingTree) {
      let opt = document.createElement('option');
      opt.value = key;
      opt.innerText = openingTree[key].name;
      openSelect.appendChild(opt);
    }

    function onOpeningChange() {
      const selectedKey = openSelect.value;
      const variations = openingTree[selectedKey].variations;
      const varSelect = document.getElementById('variation-select');
      varSelect.innerHTML = '';

      variations.forEach((v, idx) => {
        let opt = document.createElement('option');
        opt.value = idx;
        opt.innerText = v.name;
        varSelect.appendChild(opt);
      });

      onVariationChange();
    }

    function onVariationChange() {
      const openKey = openSelect.value;
      const varIdx = document.getElementById('variation-select').value;
      const item = openingTree[openKey].variations[varIdx];

      currentMoves = item.moves;
      currentStepIndex = item.moves.length;
      updateBoardPosition();
    }

    function stepMove(direction) {
      currentStepIndex += direction;
      if (currentStepIndex < 0) currentStepIndex = 0;
      if (currentStepIndex > currentMoves.length) currentStepIndex = currentMoves.length;
      updateBoardPosition();
    }

    function updateBoardPosition() {
      game.reset();
      for (let i = 0; i < currentStepIndex; i++) {
        game.move(currentMoves[i]);
      }
      board.position(game.fen());
    }

    onOpeningChange();
  </script>
</body>
</html>
