<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chess Openings Trainer</title>
  <style>
    body { background-color: #120d08; color: #f0e6d2; font-family: 'Georgia', serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .container { background: #23160c; border: 3px solid #543920; padding: 20px; border-radius: 12px; max-width: 540px; width: 100%; display: flex; flex-direction: column; align-items: center; }
    .selectors { display: flex; gap: 10px; width: 100%; margin-bottom: 15px; }
    select { flex: 1; background: #362213; color: #e6c594; padding: 10px; border: 1px solid #754f2c; border-radius: 6px; cursor: pointer; }
    .board-frame { background: #402917; padding: 12px; border-radius: 8px; border: 2px solid #634125; }
    .board { display: grid; grid-template-columns: repeat(8, 1fr); width: 360px; height: 360px; border: 2px solid #28180c; }
    .square { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; }
    .light { background-color: #ebd0a7; }
    .dark { background-color: #a26c42; }
    .piece { width: 85%; pointer-events: none; }
    .move-scroll-menu { width: 100%; margin-top: 15px; background: #1a1008; border: 1px solid #543920; display: flex; gap: 8px; overflow-x: auto; padding: 8px; border-radius: 6px; }
    .move-item { background: #362213; color: #e6c594; padding: 8px 14px; border-radius: 4px; cursor: pointer; white-space: nowrap; }
    .move-item.active { background: #e6c594; color: #23160c; font-weight: bold; }
    .lesson-box { margin-top: 15px; width: 100%; background: #1a1008; border-left: 4px solid #e6c594; padding: 12px; font-size: 0.95rem; }
  </style>
</head>
<body>

  <h1>Chess Openings Trainer</h1>
  <div class="container">
    <div class="selectors">
      <select id="categorySelect" onchange="loadCategory()"></select>
      <select id="openingSelect" onchange="selectOpening()"></select>
    </div>
    <div class="board-frame"><div id="board" class="board"></div></div>
    <div class="move-scroll-menu" id="moveMenu"></div>
    <div class="lesson-box" id="lessonBox">Select an opening to start learning!</div>
  </div>

  <script>
    const pieceImages = {
      'wP': 'https://chessboardjs.com/img/chesspieces/wikipedia/wP.png',
      'wR': 'https://chessboardjs.com/img/chesspieces/wikipedia/wR.png',
      'wN': 'https://chessboardjs.com/img/chesspieces/wikipedia/wN.png',
      'wB': 'https://chessboardjs.com/img/chesspieces/wikipedia/wB.png',
      'wQ': 'https://chessboardjs.com/img/chesspieces/wikipedia/wQ.png',
      'wK': 'https://chessboardjs.com/img/chesspieces/wikipedia/wK.png',
      'bP': 'https://chessboardjs.com/img/chesspieces/wikipedia/bP.png',
      'bR': 'https://chessboardjs.com/img/chesspieces/wikipedia/bR.png',
      'bN': 'https://chessboardjs.com/img/chesspieces/wikipedia/bN.png',
      'bB': 'https://chessboardjs.com/img/chesspieces/wikipedia/bB.png',
      'bQ': 'https://chessboardjs.com/img/chesspieces/wikipedia/bQ.png',
      'bK': 'https://chessboardjs.com/img/chesspieces/wikipedia/bK.png'
    };

    const openingsData = {
      "King's Pawn (1.e4)": {
        "Ruy Lopez": { moves: [["e2","e4"], ["e7","e5"], ["g1","f3"], ["b8","c6"], ["f1","b5"]], lessons: ["Start: e4.", "1...e5.", "2.Nf3.", "2...Nc6.", "3.Bb5: The Ruy Lopez!"] },
        "Italian Game": { moves: [["e2","e4"], ["e7","e5"], ["g1","f3"], ["b8","c6"], ["f1","c4"]], lessons: ["Start: e4.", "1...e5.", "2.Nf3.", "2...Nc6.", "3.Bc4 targets f7."] },
        "Sicilian Defense": { moves: [["e2","e4"], ["c7","c5"], ["g1","f3"], ["d7","d6"], ["d2","d4"], ["c5","d4"], ["f3","d4"]], lessons: ["1.e4 c5 (Sicilian)", "2.Nf3 d6", "3.d4 cxd4", "4.Nxd4: Standard open setup."] }
      },
      "Queen's Pawn (1.d4)": {
        "Catalan Opening": { moves: [["d2","d4"], ["g8","f6"], ["c2","c4"], ["e7","e6"], ["g2","g3"]], lessons: ["1.d4 Nf6", "2.c4 e6", "3.g3: The Catalan!"] },
        "Dutch Defense": { moves: [["d2","d4"], ["f7","f5"]], lessons: ["1.d4 f5: The aggressive Dutch!"] },
        "London System": { moves: [["d2","d4"], ["d7","d5"], ["c1","f4"], ["g8","f6"], ["e2","e3"]], lessons: ["1.d4 d5", "2.Bf4 (London System)", "3.e3 solidifies."] }
      },
      "Meme & Unorthodox": {
        "Coca-Cola Gambit": { moves: [["g2","g4"], ["g7","g5"], ["f2","f4"]], lessons: ["1.g4 g5", "2.f4: Coca-Cola Gambit!"] },
        "Pepsi Countergambit": { moves: [["g2","g4"], ["g7","g5"], ["f2","f4"], ["f7","f5"]], lessons: ["...2...f5: The Pepsi Counter!"] }
      }
    };

    const initialBoard = { 'a8':'bR', 'b8':'bN', 'c8':'bB', 'd8':'bQ', 'e8':'bK', 'f8':'bB', 'g8':'bN', 'h8':'bR', 'a7':'bP', 'b7':'bP', 'c7':'bP', 'd7':'bP', 'e7':'bP', 'f7':'bP', 'g7':'bP', 'h7':'bP', 'a2':'wP', 'b2':'wP', 'c2':'wP', 'd2':'wP', 'e2':'wP', 'f2':'wP', 'g2':'wP', 'h2':'wP', 'a1':'wR', 'b1':'wN', 'c1':'wB', 'd1':'wQ', 'e1':'wK', 'f1':'wB', 'g1':'wN', 'h1':'wR' };
    
    function init() {
      const catSelect = document.getElementById("categorySelect");
      Object.keys(openingsData).forEach(cat => catSelect.add(new Option(cat, cat)));
      renderBoard();
      loadCategory();
    }

    function loadCategory() {
      const cat = document.getElementById("categorySelect").value;
      const opSelect = document.getElementById("openingSelect");
      opSelect.innerHTML = "";
      Object.keys(openingsData[cat]).forEach(op => opSelect.add(new Option(op, op)));
      selectOpening();
    }

    function selectOpening() {
      const cat = document.getElementById("categorySelect").value;
      const op = document.getElementById("openingSelect").value;
      const data = openingsData[cat][op];
      const menu = document.getElementById("moveMenu");
      menu.innerHTML = `<div class="move-item active" onclick="jump(0, -1)">Start</div>`;
      data.moves.forEach((mv, i) => menu.innerHTML += `<div class="move-item" onclick="jump(${i+1}, ${i})">${i+1}. ${mv[0]}-${mv[1]}</div>`);
      jump(0, -1);
    }

    function jump(step, lessonIdx) {
      const state = JSON.parse(JSON.stringify(initialBoard));
      const cat = document.getElementById("categorySelect").value;
      const op = document.getElementById("openingSelect").value;
      const data = openingsData[cat][op];
      for(let i=0; i<step; i++) { const [f, t] = data.moves[i]; state[t] = state[f]; delete state[f]; }
      updateBoard(state);
      document.getElementById("lessonBox").innerText = lessonIdx === -1 ? "Ready to learn?" : data.lessons[lessonIdx];
      document.querySelectorAll('.move-item').forEach((el, i) => el.classList.toggle('active', i === step));
    }

    function updateBoard(state) {
      const files = ['a','b','c','d','e','f','g','h'];
      for(let r=8; r>=1; r--) for(let f=0; f<8; f++) {
        const sq = files[f]+r, el = document.getElementById(`sq-${sq}`);
        el.innerHTML = state[sq] ? `<img src="${pieceImages[state[sq]]}" class="piece">` : "";
      }
    }

    function renderBoard() {
      const b = document.getElementById("board");
      const files = ['a','b','c','d','e','f','g','h'];
      for(let r=8; r>=1; r--) for(let f=0; f<8; f++) {
        const s = document.createElement("div");
        s.id = `sq-${files[f]+r}`;
        s.className = `square ${(r+f)%2 ? 'light' : 'dark'}`;
        b.appendChild(s);
      }
    }
    window.onload = init;
  </script>
</body>
</html>
